<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All 36 SVG Icons Preview</title>
    <style>
      :root {
        --bg: #ff1134;
        --ink: #090909;
        --panel: rgba(255, 255, 255, 0.09);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at 20% 0, #ff3a52 0, var(--bg) 58%);
        color: var(--ink);
      }
      main { max-width: 1400px; margin: 0 auto; padding: 20px; }
      h1 { margin: 0 0 10px; font-size: 30px; }
      p { margin: 0 0 20px; }
      .pack {
        border: 2px solid var(--ink);
        margin-bottom: 22px;
        background: rgba(0, 0, 0, 0.06);
      }
      .pack-header {
        border-bottom: 2px solid var(--ink);
        padding: 10px 12px;
        font-weight: 700;
      }
      .row {
        display: grid;
        grid-template-columns: 1.4fr 2fr;
      }
      .source {
        border-right: 2px solid var(--ink);
        background: var(--panel);
      }
      .source img {
        width: 100%;
        display: block;
      }
      .icons {
        display: grid;
        grid-template-columns: repeat(3, minmax(180px, 1fr));
        gap: 0;
      }
      .tile {
        border-left: 2px solid var(--ink);
        border-top: 2px solid var(--ink);
        background: var(--panel);
      }
      .tile:nth-child(-n + 3) { border-top: 0; }
      .tile:nth-child(3n + 1) { border-left: 0; }
      .meta {
        border-bottom: 2px solid var(--ink);
        padding: 6px 8px;
        font-size: 12px;
        font-weight: 700;
      }
      .icon-box {
        height: 180px;
        display: grid;
        place-items: center;
        padding: 18px;
        overflow: hidden;
      }
      .icon-box img {
        display: block;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        object-position: center;
        vertical-align: top;
      }
      @media (max-width: 1050px) {
        .row { grid-template-columns: 1fr; }
        .source { border-right: 0; border-bottom: 2px solid var(--ink); }
      }
      @media (max-width: 640px) {
        .icons { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
        .tile:nth-child(3n + 1) { border-left: 2px solid var(--ink); }
        .tile:nth-child(-n + 3) { border-top: 2px solid var(--ink); }
        .tile:nth-child(-n + 2) { border-top: 0; }
        .tile:nth-child(2n + 1) { border-left: 0; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Icon Packs -> SVG (36 total)</h1>
      <p>Each section shows the original source pack and its 6 traced SVG outputs.</p>
      <div id="packs"></div>
    </main>
    <script>
      const packs = [1, 2, 3, 4, 5, 6];
      const root = document.getElementById("packs");

      const iconNames = [
        "01-connected-user-network.svg",
        "02-secure-database-lock.svg",
        "03-vision-aperture-eye.svg",
        "04-voice-message-waveform.svg",
        "05-modular-cubes-system.svg",
        "06-ai-chip-processor.svg",
        "07-crystal-ball-insight.svg",
        "08-support-agent-hand.svg",
        "09-monitoring-eye.svg",
        "10-alert-bell-ring.svg",
        "11-performance-check-gauge.svg",
        "12-time-cycle-clock.svg",
        "13-governance-building.svg",
        "14-deep-tech-core.svg",
        "15-speech-input-terminal.svg",
        "16-growth-uptrend.svg",
        "17-verified-target.svg",
        "18-no-cloud-server.svg",
        "19-warning-alert.svg",
        "20-network-node-mesh.svg",
        "21-process-hierarchy.svg",
        "22-modular-block-stack.svg",
        "23-rocket-launch.svg",
        "24-sync-refresh-cycle.svg",
        "25-outbound-link.svg",
        "26-email-message.svg",
        "27-global-web.svg",
        "28-access-lock.svg",
        "29-security-shield.svg",
        "30-latency-clock-speed.svg",
        "31-connected-identity.svg",
        "32-platform-layers.svg",
        "33-vision-scan-eye.svg",
        "34-ai-brain-circuit.svg",
        "35-power-lightning.svg",
        "36-secure-lock-badge.svg"
      ];

      for (const pack of packs) {
        const start = (pack - 1) * 6 + 1;
        const section = document.createElement("section");
        section.className = "pack";

        const header = document.createElement("div");
        header.className = "pack-header";
        header.textContent = `iconpack${pack}.jpeg`;
        section.appendChild(header);

        const row = document.createElement("div");
        row.className = "row";

        const source = document.createElement("div");
        source.className = "source";
        source.innerHTML = `<img src="../iconpack${pack}.jpeg" alt="iconpack${pack} source" />`;

        const icons = document.createElement("div");
        icons.className = "icons";
        for (let i = 0; i < 6; i++) {
          const file = iconNames[start + i - 1];

          const tile = document.createElement("article");
          tile.className = "tile";
          tile.innerHTML = `
            <div class="meta">${file}</div>
            <div class="icon-box"><img src="svg/${file}" alt="${file}" /></div>
          `;
          icons.appendChild(tile);
        }

        row.appendChild(source);
        row.appendChild(icons);
        section.appendChild(row);
        root.appendChild(section);
      }
    </script>
  </body>
</html>
